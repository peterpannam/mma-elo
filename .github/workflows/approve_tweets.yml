# .github/workflows/approve_tweets.yml
# =============================================================
# UFC ELO Ratings — Tweet Approval & Posting
# =============================================================
# Manual workflow_dispatch only. You trigger this AFTER reviewing
# the email notification from the main pipeline.
#
# Steps:
#   1. (Optional) Mark drafts as 'approved' in Supabase
#   2. Dry run — print all tweets to the Actions log for final check
#   3. Post all approved drafts to Twitter via Tweepy
#
# To trigger:
#   GitHub → Actions → "Post Approved Tweets" → Run workflow
#   Enter the event_id from the review email.
# =============================================================

name: Post Approved Tweets

on:
  workflow_dispatch:
    inputs:
      event_id:
        description: "Event UUID to post tweets for (from the review email)"
        required: true
        type: string

      dry_run:
        description: "Dry run only — print tweets to log without posting"
        required: false
        type: boolean
        default: false


jobs:
  post_tweets:
    name: Post Approved Tweets to Twitter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install supabase tweepy

      # ── Step 1: Dry run first (always) ──────────────────────
      # Even if dry_run is false, we print a preview to the log
      # for the audit trail.
      - name: Dry run preview
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          echo "=== DRY RUN PREVIEW ==="
          python twitter_automation/tweet_poster.py \
            --event-id "${{ inputs.event_id }}" \
            --dry-run \
            --auto-approve

      # ── Step 2: Actually post (skipped if dry_run = true) ───
      - name: Post tweets
        if: inputs.dry_run == false
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python twitter_automation/tweet_poster.py \
            --event-id "${{ inputs.event_id }}" \
            --auto-approve
          echo "✅ Tweets posted successfully."

      - name: Confirm dry run only
        if: inputs.dry_run == true
        run: echo "ℹ️ Dry run complete. No tweets were posted."
